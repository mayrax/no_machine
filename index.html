<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO.</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f0f0f0;
    --accent: #ff3333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                color 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    text-align: center;
    width: 100%;
    max-width: 900px;
  }

  .title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(6rem, 18vw, 14rem);
    letter-spacing: -0.04em;
    line-height: 0.85;
    text-transform: uppercase;
    user-select: none;
    position: relative;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .title:hover {
    transform: scale(1.03);
  }

  .title::after {
    content: '';
    position: absolute;
    bottom: -0.05em;
    left: 0;
    width: 100%;
    height: 0.06em;
    background: var(--accent);
    transition: background 0.6s ease;
  }

  .reason-box {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 2rem;
    width: 100%;
  }

  .reason {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 3.5vw, 2.4rem);
    line-height: 1.35;
    max-width: 700px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .reason.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 1rem 2.5rem;
    border: 2px solid var(--fg);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--fg);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 0;
  }

  .btn:hover::before {
    transform: translateY(0);
  }

  .btn:hover {
    color: var(--bg);
  }

  .btn span {
    position: relative;
    z-index: 1;
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .counter {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.4;
    margin-top: 1rem;
  }

  .credit {
    position: fixed;
    bottom: 1.5rem;
    right: 2rem;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.3;
    z-index: 3;
  }

  .credit a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid currentColor;
  }

  /* Shake animation on fetch */
  @keyframes shake {
    0%, 100% { transform: translateX(0) rotate(0); }
    10% { transform: translateX(-8px) rotate(-1.5deg); }
    30% { transform: translateX(8px) rotate(1.5deg); }
    50% { transform: translateX(-6px) rotate(-1deg); }
    70% { transform: translateX(6px) rotate(1deg); }
    90% { transform: translateX(-3px) rotate(-0.5deg); }
  }

  .shake {
    animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }

  /* Decorative corner marks */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 3;
    opacity: 0.15;
    transition: opacity 0.3s;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--fg);
    transition: background 0.6s;
  }
  .corner--tl { top: 1.5rem; left: 1.5rem; }
  .corner--tl::before { width: 100%; height: 2px; top: 0; left: 0; }
  .corner--tl::after { width: 2px; height: 100%; top: 0; left: 0; }
  .corner--tr { top: 1.5rem; right: 1.5rem; }
  .corner--tr::before { width: 100%; height: 2px; top: 0; right: 0; }
  .corner--tr::after { width: 2px; height: 100%; top: 0; right: 0; }
  .corner--bl { bottom: 1.5rem; left: 1.5rem; }
  .corner--bl::before { width: 100%; height: 2px; bottom: 0; left: 0; }
  .corner--bl::after { width: 2px; height: 100%; bottom: 0; left: 0; }
  .corner--br { bottom: 1.5rem; right: 1.5rem; }
  .corner--br::before { width: 100%; height: 2px; bottom: 0; right: 0; }
  .corner--br::after { width: 2px; height: 100%; bottom: 0; right: 0; }

  /* Loading dots */
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
  .loading span {
    animation: pulse 1.2s infinite ease-in-out;
    font-size: 2rem;
  }
  .loading span:nth-child(2) { animation-delay: 0.15s; }
  .loading span:nth-child(3) { animation-delay: 0.3s; }
</style>
</head>
<body>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="container">
  <div class="title" id="title">NO.</div>

  <div class="reason-box">
    <div class="reason" id="reason">Press the button. Get rejected.</div>
  </div>

  <button class="btn" id="fetchBtn" onclick="getNo()">
    <span>Tell me NO</span>
  </button>

  <div class="counter" id="counter">rejections served: 0</div>
</div>

<div class="credit">
  powered by <a href="https://github.com/hotheadhacker/no-as-a-service" target="_blank">NaaS</a>
</div>

<script>
  const palettes = [
    { bg: '#0a0a0a', fg: '#f0f0f0', accent: '#ff3333' },
    { bg: '#1a0000', fg: '#ff6b6b', accent: '#ff0000' },
    { bg: '#fdf6e3', fg: '#1a1a1a', accent: '#dc322f' },
    { bg: '#0d1117', fg: '#58a6ff', accent: '#f78166' },
    { bg: '#2d1b69', fg: '#e8d5ff', accent: '#ff6bcb' },
    { bg: '#fff8e1', fg: '#1b1b1b', accent: '#ff6f00' },
    { bg: '#001a1a', fg: '#00ffcc', accent: '#00ff88' },
    { bg: '#1a0a2e', fg: '#d4a5ff', accent: '#ff4ecd' },
    { bg: '#f5f0eb', fg: '#2c2c2c', accent: '#c0392b' },
    { bg: '#0b0c10', fg: '#c5c6c7', accent: '#66fcf1' },
    { bg: '#1c1c1c', fg: '#ffd700', accent: '#ff4500' },
    { bg: '#0a192f', fg: '#64ffda', accent: '#f07178' },
    { bg: '#fafafa', fg: '#222222', accent: '#0066ff' },
    { bg: '#2b0a0a', fg: '#ffcccc', accent: '#ff1a1a' },
    { bg: '#0f0f23', fg: '#cccccc', accent: '#ffff66' },
    { bg: '#f0e6d3', fg: '#3c2415', accent: '#b85c1e' },
  ];

  let count = 0;
  let lastPaletteIdx = -1;
  const title = document.getElementById('title');
  const reason = document.getElementById('reason');
  const counter = document.getElementById('counter');
  const btn = document.getElementById('fetchBtn');

  // Show initial reason
  requestAnimationFrame(() => {
    reason.classList.add('visible');
  });

  function changePalette() {
    let idx;
    do {
      idx = Math.floor(Math.random() * palettes.length);
    } while (idx === lastPaletteIdx);
    lastPaletteIdx = idx;

    const p = palettes[idx];
    document.documentElement.style.setProperty('--bg', p.bg);
    document.documentElement.style.setProperty('--fg', p.fg);
    document.documentElement.style.setProperty('--accent', p.accent);
  }

  async function getNo() {
    btn.disabled = true;

    // Hide current reason
    reason.classList.remove('visible');

    // Show loading
    setTimeout(() => {
      reason.innerHTML = '<span class="loading"><span>.</span><span>.</span><span>.</span></span>';
      reason.classList.add('visible');
    }, 300);

    try {
      const res = await fetch('https://naas.isalman.dev/no');
      const data = await res.json();

      // Change palette
      changePalette();

      // Shake the title
      title.classList.add('shake');
      setTimeout(() => title.classList.remove('shake'), 500);

      // Animate new reason in
      setTimeout(() => {
        reason.classList.remove('visible');
        setTimeout(() => {
          reason.innerHTML = `&ldquo;${data.reason}&rdquo;`;
          reason.classList.add('visible');
          count++;
          counter.textContent = `rejections served: ${count}`;
        }, 300);
      }, 200);

    } catch (err) {
      reason.classList.remove('visible');
      setTimeout(() => {
        reason.innerHTML = 'Even the server said no. Try again.';
        reason.classList.add('visible');
      }, 300);
    }

    setTimeout(() => { btn.disabled = false; }, 1000);
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (!btn.disabled) getNo();
    }
  });
</script>
</body>
</html>
